<header class="container">
  <nav class="navbar">
    <a href="/" class="logo">
      <span>🧠</span> 锦创AI
    </a>
    <ul class="nav-links">
      {{ range .Site.Menus.main }}
        <li><a href="{{ .URL }}" class="{{ if $.IsMenuCurrent "main" . }}active{{ end }}">{{ .Name }}</a></li>
      {{ end }}
    </ul>
    <button id="theme-toggle" class="theme-toggle" aria-label="切换暗色模式">
      🌓 <span class="mode-text">模式</span>
    </button>
  </nav>
  <div class="search-box">
    <input type="text" id="search-input" placeholder="🔍 搜索文章、标签..." autocomplete="off">
    <div id="search-results"></div>
  </div>
</header>
