<div class="social-icons">
  <a href="{{ .Site.Params.github }}" target="_blank" title="GitHub">🐙</a>
  <a href="{{ .Site.Params.csdn }}" target="_blank" title="CSDN">📘</a>
  <a href="{{ .Site.Params.zhihu }}" target="_blank" title="知乎">🤔</a>
  <a href="mailto:{{ .Site.Params.email }}" title="邮箱">✉️</a>
  <a href="#" id="wechat-trigger" title="微信公众号">💬</a>
</div>
<div id="wechat-popup" style="display:none; margin-top:1rem;">
  <img src="{{ .Site.Params.wechatQR }}" alt="微信公众号" width="180">
  <p>扫码关注「锦创AI」</p>
</div>
<script>
document.getElementById('wechat-trigger').addEventListener('click', (e) => {
  e.preventDefault();
  const popup = document.getElementById('wechat-popup');
  popup.style.display = popup.style.display === 'none' ? 'block' : 'none';
});
</script>
