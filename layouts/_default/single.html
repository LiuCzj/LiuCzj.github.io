{{ define "main" }}
  <article class="card">
    <h1>{{ .Title }}</h1>
    <div style="color: #aaa; margin-bottom: 1rem;">
      {{ .Date.Format "2006-01-02" }} · 
      {{ if eq .Params.audience "professional" }}技术深潜{{ else }}科普入门{{ end }}
    </div>
    <div>{{ .Content }}</div>
    <div class="tags">
      {{ range .Params.tags }}<span class="tag">{{ . }}</span>{{ end }}
    </div>
  </article>
  {{ partial "giscus.html" . }}
{{ end }}
