{{ define "main" }}
  <h1 style="margin-bottom: 1.5rem;">{{ .Title }}</h1>
  {{ .Content }}
  {{ range .Pages }}
    <article class="card">
      <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
      <p class="summary">{{ if .Description }}{{ .Description }}{{ else }}{{ .Summary | truncate 120 }}{{ end }}</p>
      <div class="tags">
        {{ range .Params.tags }}<span class="tag">{{ . }}</span>{{ end }}
      </div>
    </article>
  {{ end }}
{{ end }}
